<!doctype html>
<html lang="en" class="dark" style="">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            href="https://fonts.googleapis.com/css2?family=Anton&amp;family=Hanken+Grotesk:wght@400&amp;family=JetBrains+Mono:wght@700&amp;display=swap"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=block"
            rel="stylesheet"
        />
        <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
        <script id="tailwind-config">
            try {
                tailwind.config = {
                    darkMode: "class",
                    theme: {
                        extend: {
                            colors: {
                                "on-primary": "#2f3131",
                                "on-error": "#690005",
                                "on-secondary-container": "#b5b5b5",
                                "on-secondary": "#303030",
                                primary: "#ffffff",
                                "secondary-fixed-dim": "#c6c6c6",
                                "primary-container": "#e2e2e2",
                                error: "#ffb4ab",
                                "surface-dim": "#131313",
                                "on-error-container": "#ffdad6",
                                "tertiary-fixed": "#e2e2e2",
                                "surface-bright": "#393939",
                                "surface-container-low": "#1c1b1b",
                                "on-background": "#e5e2e1",
                                "surface-container-highest": "#353535",
                                secondary: "#c6c6c6",
                                "primary-fixed-dim": "#c6c6c7",
                                "error-container": "#93000a",
                                "on-surface-variant": "#c4c7c8",
                                "on-secondary-fixed-variant": "#474747",
                                "secondary-fixed": "#e2e2e2",
                                "primary-fixed": "#e2e2e2",
                                "on-tertiary": "#2f3131",
                                "tertiary-fixed-dim": "#c6c6c7",
                                "on-primary-fixed-variant": "#454747",
                                "secondary-container": "#474747",
                                "inverse-primary": "#5d5f5f",
                                "surface-tint": "#c6c6c7",
                                "surface-container-high": "#2a2a2a",
                                "on-tertiary-container": "#636565",
                                "surface-variant": "#353535",
                                surface: "#131313",
                                outline: "#8e9192",
                                "surface-container-lowest": "#0e0e0e",
                                "on-primary-container": "#636565",
                                "inverse-surface": "#e5e2e1",
                                background: "#131313",
                                "tertiary-container": "#e2e2e2",
                                "on-tertiary-fixed": "#1a1c1c",
                                "surface-container": "#20201f",
                                tertiary: "#ffffff",
                                "on-surface": "#e5e2e1",
                                "on-secondary-fixed": "#1b1b1b",
                                "inverse-on-surface": "#313030",
                                "on-tertiary-fixed-variant": "#454747",
                                "outline-variant": "#444748",
                                "on-primary-fixed": "#1a1c1c",
                            },
                            borderRadius: {
                                DEFAULT: "0.25rem",
                                lg: "0.5rem",
                                xl: "0.75rem",
                                full: "9999px",
                            },
                            spacing: {
                                "margin-mobile": "20px",
                                "margin-desktop": "64px",
                                "stack-md": "24px",
                                "stack-sm": "8px",
                                gutter: "24px",
                                "stack-lg": "48px",
                                "stack-xl": "80px",
                                unit: "4px",
                                "container-max": "1440px",
                            },
                            fontFamily: {
                                "headline-md": ["Anton"],
                                "body-lg": ["Hanken Grotesk"],
                                "display-lg-mobile": ["Anton"],
                                "body-md": ["Hanken Grotesk"],
                                "display-lg": ["Anton"],
                                "label-caps": ["JetBrains Mono"],
                                "headline-lg": ["Anton"],
                            },
                            fontSize: {
                                "headline-md": [
                                    "32px",
                                    {
                                        lineHeight: "36px",
                                        letterSpacing: "0.02em",
                                        fontWeight: "400",
                                    },
                                ],
                                "body-lg": [
                                    "18px",
                                    {
                                        lineHeight: "28px",
                                        letterSpacing: "0em",
                                        fontWeight: "400",
                                    },
                                ],
                                "display-lg-mobile": [
                                    "48px",
                                    {
                                        lineHeight: "44px",
                                        letterSpacing: "-0.02em",
                                        fontWeight: "400",
                                    },
                                ],
                                "body-md": [
                                    "16px",
                                    {
                                        lineHeight: "24px",
                                        letterSpacing: "0em",
                                        fontWeight: "400",
                                    },
                                ],
                                "display-lg": [
                                    "96px",
                                    {
                                        lineHeight: "90px",
                                        letterSpacing: "-0.04em",
                                        fontWeight: "400",
                                    },
                                ],
                                "label-caps": [
                                    "12px",
                                    {
                                        lineHeight: "16px",
                                        letterSpacing: "0.1em",
                                        fontWeight: "700",
                                    },
                                ],
                                "headline-lg": [
                                    "40px",
                                    {
                                        lineHeight: "48px",
                                        letterSpacing: "0.02em",
                                        fontWeight: "400",
                                    },
                                ],
                            },
                        },
                    },
                };
            } catch (_e) {}
        </script>
    </head>
    <body
        class="bg-background dark:bg-background text-on-surface dark:text-on-surface antialiased min-h-screen flex flex-col font-body-md selection:bg-primary selection:text-on-primary"
    >
        <!-- TopAppBar -->

        <!-- Main Content Canvas-->
        <main
            class="flex-grow w-full max-w-container-max mx-auto px-margin-mobile md:px-margin-desktop py-stack-lg md:py-stack-xl flex flex-col gap-stack-lg mb-24"
        >
            <!-- Primary Action Cards -->
            <section
                class="flex flex-col gap-stack-md"
                aria-label="Custom Settings"
            >
                <a
                    href="#"
                    class="group block border border-[#333333] hover:border-primary border-b-2 hover:border-b-[3px] transition-all duration-150 ease-out p-stack-md relative overflow-hidden bg-transparent"
                >
                    <div
                        class="absolute inset-0 bg-primary translate-y-[101%] group-hover:translate-y-0 transition-transform duration-300 ease-out z-0"
                    ></div>
                    <div
                        class="relative z-10 flex gap-stack-sm group-hover:text-on-primary items-center justify-between"
                    >
                        <div class="flex-grow flex flex-col gap-stack-sm">
                            <span
                                class="font-label-caps text-label-caps text-secondary-fixed-dim group-hover:text-on-primary transition-colors duration-150"
                                >01</span
                            >
                            <h2
                                class="font-headline-md text-headline-md text-primary group-hover:text-on-primary uppercase transition-colors duration-150"
                            >
                                CUSTOM WORKOUTS
                            </h2>
                        </div>
                        <span
                            class="material-symbols-outlined text-primary group-hover:text-on-primary transition-colors duration-150"
                            >chevron_right</span
                        >
                    </div>
                </a>

                <a
                    href="#"
                    class="group block border border-[#333333] hover:border-primary border-b-2 hover:border-b-[3px] transition-all duration-150 ease-out p-stack-md relative overflow-hidden bg-transparent"
                >
                    <div
                        class="absolute inset-0 bg-primary translate-y-[101%] group-hover:translate-y-0 transition-transform duration-300 ease-out z-0"
                    ></div>
                    <div
                        class="relative z-10 flex gap-stack-sm group-hover:text-on-primary items-center justify-between"
                    >
                        <div class="flex-grow flex flex-col gap-stack-sm">
                            <span
                                class="font-label-caps text-label-caps text-secondary-fixed-dim group-hover:text-on-primary transition-colors duration-150"
                                >02</span
                            >
                            <h2
                                class="font-headline-md text-headline-md text-primary group-hover:text-on-primary uppercase transition-colors duration-150"
                            >
                                CUSTOM EXERCISES
                            </h2>
                        </div>
                        <span
                            class="material-symbols-outlined text-primary group-hover:text-on-primary transition-colors duration-150"
                            >chevron_right</span
                        >
                    </div>
                </a>
            </section>

            <!-- Secondary Links & Version -->
            <section
                class="flex flex-col gap-stack-sm mt-auto"
                aria-label="App Information"
            >
                <ul class="flex flex-col border-t border-[#333333]">
                    <li class="border-b border-[#333333]">
                        <a
                            href="#"
                            class="flex justify-between items-center py-stack-md text-primary hover:text-outline transition-colors duration-150"
                        >
                            <span
                                class="font-label-caps text-label-caps tracking-widest uppercase"
                                >ACCOUNT INFO</span
                            >
                            <span
                                class="material-symbols-outlined text-outline"
                                data-icon="chevron_right"
                                data-weight="regular"
                                >chevron_right</span
                            >
                        </a>
                    </li>
                    <li class="border-b border-[#333333]">
                        <a
                            href="#"
                            class="flex justify-between items-center py-stack-md text-primary hover:text-outline transition-colors duration-150"
                        >
                            <span
                                class="font-label-caps text-label-caps tracking-widest uppercase"
                                >APP SETTINGS</span
                            >
                            <span
                                class="material-symbols-outlined text-outline"
                                data-icon="chevron_right"
                                data-weight="regular"
                                >chevron_right</span
                            >
                        </a>
                    </li>
                </ul>

                <div class="pt-stack-md">
                    <p
                        class="font-label-caps text-label-caps text-outline uppercase tracking-widest"
                    >
                        VERSION 4.2.0-KINETIC
                    </p>
                </div>
            </section>
        </main>

        <!-- BottomNavBar -->
    </body>
</html>
