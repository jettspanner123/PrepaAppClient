        <style>
            /* Kinetic Minimalism Resets & Custom Styles */
            body {
                background-color: #000000; /* Force true black background as per Layer 0 */
                color: #ffffff;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
                overflow-x: hidden;
            }

            .kinetic-input {
                background: transparent;
                border: none;
                border-bottom: 2px solid #ffffff;
                color: #ffffff;
                font-family: "JetBrains Mono", monospace;
                padding: 8px 4px;
                width: 100%;
                transition: all 150ms ease-out;
            }

            .kinetic-input:focus {
                outline: none;
                border-bottom: 2px solid #ffffff;
                background: rgba(255, 255, 255, 0.05);
            }

            .kinetic-input::placeholder {
                color: #666666;
            }

            .exercise-card {
                border: 1px solid #333333;
                transition: all 150ms ease-out;
            }

            .exercise-card:hover {
                border: 2px solid #ffffff;
            }

            .kinetic-btn-primary {
                background: #ffffff;
                color: #000000;
                font-family: "Anton", sans-serif;
                text-transform: uppercase;
                transition: all 150ms ease-out;
            }

            .kinetic-btn-primary:active {
                transform: scale(0.98);
            }

            .kinetic-btn-secondary {
                background: transparent;
                color: #ffffff;
                border: 2px solid #ffffff;
                font-family: "Anton", sans-serif;
                text-transform: uppercase;
                transition: all 150ms ease-out;
            }

            .kinetic-btn-secondary:hover {
                background: #ffffff;
                color: #000000;
            }

            .kinetic-btn-secondary:active {
                transform: scale(0.98);
            }

            /* Timer pulse effect */
            @keyframes pulse-opacity {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.5;
                }
            }
            .timer-colon {
                animation: pulse-opacity 1s infinite;
            }

            /* Hide TopNav on Desktop as this is a focused session screen */
            /* Hiding bottom nav per semantic mapping rule for transactional/focused tasks (workout session) */
        </style>
        <style>
            body {
                min-height: max(884px, 100dvh);
            }
        </style>
    </head>
    <body class="bg-background text-on-surface antialiased min-h-screen pb-32">
        <!-- TopAppBar (Web) - Hidden for focused session but kept structurally available -->
        <header
            class="hidden md:flex flex items-center justify-between px-margin-desktop h-16 w-full z-50 fixed top-0 w-full bg-surface/80 backdrop-blur-lg border-b border-white/10 shadow-none"
        >
            <div class="flex items-center gap-4">
                <button
                    class="text-primary hover:opacity-80 transition-opacity active:scale-95 transition-transform"
                >

                        >arrow_back</span

                </button>
                <h1
                    class="font-headline-md text-headline-md text-primary tracking-tighter"
                >
                    FORGE
                </h1>
            </div>
            <div class="flex items-center gap-6">
                <!-- Nav hidden to focus on session -->
                <button
                    class="text-primary hover:opacity-80 transition-opacity"
                >
                    <span class="material-symbols-outlined text-3xl"
                        >close</span
                    >
                </button>
            </div>
        </header>
        <!-- Main Content Canvas -->
        <main
            class="w-full max-w-container-max mx-auto px-margin-mobile md:px-margin-desktop pt-8 md:pt-32 flex flex-col min-h-screen"
        >
            <!-- Header Section: Title & Timer -->

            >

                    <span

                            >Power V</span

                    </h1>
                </div>
                <div class="flex flex-col items-start md:items-end">
                    <span
                        class="font-label-caps text-label-caps text-on-surface-variant uppercase mb-unit"
                        >Elapsed Time</span
                    >
                    <div
                        class="font-label-caps text-4xl md:text-5xl font-bold tracking-widest text-primary flex items-center"
                        id="workout-timer"
                    >
                        00<span class="timer-colon">:</span>16<span
                            class="timer-colon"
                            >:</span

            </section>
            <!-- Exercises List -->

                            </div>
                            <div class="flex-1 flex gap-4 items-end">

                                    />
                                </div>
                                <div class="flex-1">
                                    <span

                            >

                                    "

                        </div>
                        <!-- Set 2 -->

                            </div>
                            <div class="flex-1 flex gap-4 items-end">
                                <div class="flex-1">
                                    <span
                                        class="font-label-caps text-label-caps text-on-surface-variant block mb-1"

                                    >
                                    <input

                                        placeholder="315"

                            <div class="w-16">
                                <span
                                    class="font-label-caps text-label-caps text-on-surface-variant block"
                                    >Set</span
                                >
                                <span class="font-label-caps text-lg font-bold"
                                    >1/4</span

                            </div>
                            <div class="flex-1 flex gap-4 items-end">

                    <div class="flex flex-col gap-4">
                        <!-- Set 1 -->
                        <div

                            <div class="w-16">
                                <span

                            <div class="flex-1 flex gap-4 items-end">
                                <div class="flex-1">
                                    <span

            </section>
            <!-- Bottom Action Area - Finish Session -->
            <div

            >
                <div class="w-full max-w-md mx-auto">
                    <button
                        class="kinetic-btn-primary w-full py-4 text-2xl tracking-widest flex items-center justify-center gap-3"
                    >

                        <span

                            >arrow_forward</span

        </main>
        <script>
            // Simple timer increment script for prototyping
            let seconds = 942; // 15:42
            const timerDisplay = document.getElementById("workout-timer");

            setInterval(() => {
                seconds++;
                const h = Math.floor(seconds / 3600);
                const m = Math.floor((seconds % 3600) / 60);
                const s = seconds % 60;

                const format = (val) => val.toString().padStart(2, "0");

                timerDisplay.innerHTML = `${format(h)}<span class="timer-colon">:</span>${format(m)}<span class="timer-colon">:</span>${format(s)}`;
            }, 1000);
        </script>
    </body>
