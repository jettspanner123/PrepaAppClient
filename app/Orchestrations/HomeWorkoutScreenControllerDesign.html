<!doctype html>
<html class="dark" lang="en" style="">
    <head>
        <meta charset="utf-8" />
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        <link
            href="https://fonts.googleapis.com/css2?family=Anybody:wght@700;800&amp;family=JetBrains+Mono:wght@500&amp;family=Lexend:wght@400;500&amp;display=swap"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=block"
            rel="stylesheet"
        />
        <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
        <script id="tailwind-config">
            try {
                tailwind.config = {
                    darkMode: "class",
                    theme: {
                        extend: {
                            colors: {
                                "surface-variant": "#1a1a1a",
                                "on-secondary-container": "#ffffff",
                                "on-error": "#000000",
                                error: "#ffffff",
                                "surface-dim": "#000000",
                                "on-secondary-fixed-variant": "#cccccc",
                                "on-primary-fixed-variant": "#999999",
                                outline: "#444444",
                                "secondary-fixed-dim": "#888888",
                                background: "#000000",
                                "tertiary-fixed-dim": "#888888",
                                "outline-variant": "#333333",
                                "on-primary": "#000000",
                                "surface-container-highest": "#222222",
                                "on-surface-variant": "#aaaaaa",
                                "secondary-container": "#333333",
                                primary: "#ffffff",
                                "on-surface": "#ffffff",
                                "surface-container-lowest": "#000000",
                                "inverse-primary": "#cccccc",
                                "tertiary-container": "#222222",
                                "error-container": "#444444",
                                tertiary: "#ffffff",
                                "surface-container": "#121212",
                                "on-secondary": "#ffffff",
                                "surface-container-low": "#0a0a0a",
                                "inverse-on-surface": "#111111",
                                "secondary-fixed": "#eeeeee",
                                "on-tertiary": "#000000",
                                "primary-fixed-dim": "#dddddd",
                                "on-tertiary-fixed-variant": "#888888",
                                "inverse-surface": "#ffffff",
                                "on-error-container": "#ffffff",
                                "primary-fixed": "#ffffff",
                                secondary: "#ffffff",
                                "on-secondary-fixed": "#000000",
                                "on-background": "#ffffff",
                                "on-tertiary-fixed": "#000000",
                                surface: "#000000",
                                "on-tertiary-container": "#ffffff",
                                "on-primary-container": "#000000",
                                "primary-container": "#ffffff",
                                "tertiary-fixed": "#ffffff",
                                "surface-tint": "#ffffff",
                                "surface-container-high": "#181818",
                                "surface-bright": "#222222",
                                "on-primary-fixed": "#000000",
                            },
                            borderRadius: {
                                DEFAULT: "0rem",
                                lg: "0.25rem",
                                xl: "0.5rem",
                                full: "9999px",
                            },
                            spacing: {
                                "margin-mobile": "24px",
                                "margin-desktop": "120px",
                                lg: "40px",
                                md: "24px",
                                sm: "16px",
                                xl: "64px",
                                gutter: "16px",
                                base: "4px",
                                xs: "8px",
                            },
                            fontFamily: {
                                "body-lg": ["Lexend"],
                                "display-lg-mobile": ["Anybody"],
                                "stat-value": ["Anybody"],
                                "display-lg": ["Anybody"],
                                "label-caps": ["JetBrains Mono"],
                                "body-md": ["Lexend"],
                                "headline-md": ["Anybody"],
                            },
                            fontSize: {
                                "body-lg": [
                                    "18px",
                                    { lineHeight: "28px", fontWeight: "400" },
                                ],
                                "display-lg-mobile": [
                                    "36px",
                                    {
                                        lineHeight: "40px",
                                        letterSpacing: "-0.02em",
                                        fontWeight: "800",
                                    },
                                ],
                                "stat-value": [
                                    "32px",
                                    { lineHeight: "32px", fontWeight: "700" },
                                ],
                                "display-lg": [
                                    "48px",
                                    {
                                        lineHeight: "52px",
                                        letterSpacing: "-0.02em",
                                        fontWeight: "800",
                                    },
                                ],
                                "label-caps": [
                                    "12px",
                                    {
                                        lineHeight: "16px",
                                        letterSpacing: "0.12em",
                                        fontWeight: "500",
                                    },
                                ],
                                "body-md": [
                                    "16px",
                                    { lineHeight: "24px", fontWeight: "400" },
                                ],
                                "headline-md": [
                                    "24px",
                                    {
                                        lineHeight: "32px",
                                        letterSpacing: "-0.01em",
                                        fontWeight: "800",
                                    },
                                ],
                            },
                        },
                    },
                };
            } catch (_e) {}
        </script>
    </head>
    <body class="font-body-md text-on-surface antialiased bg-black">
        <!-- Background Layer with Blurred Image -->
        <div class="fixed inset-0 z-0">
            <div
                class="absolute inset-0 bg-gradient-to-b from-black via-black/80 to-black"
            ></div>
        </div>

        <main class="relative z-10 pt-12 pb-32 px-margin-mobile">
            <!-- Hero Welcome -->
            <section class="mb-lg">
                <span
                    class="font-label-caps text-label-caps text-on-surface-variant uppercase mb-base block tracking-widest"
                    >Welcome Back, Alex</span
                >
                <h2
                    class="font-display-lg-mobile text-display-lg-mobile text-white uppercase italic"
                >
                    Forge Ahead.
                </h2>
            </section>

            <!-- Bento Grid Stats -->
            <section class="mb-lg">
                <div class="flex justify-between items-center mb-sm">
                    <h3
                        class="font-label-caps text-label-caps text-white tracking-widest"
                    >
                        TODAY'S FORGE
                    </h3>
                    <button
                        class="text-on-surface-variant font-label-caps text-[10px] uppercase border-b border-on-surface-variant/30"
                    >
                        View All
                    </button>
                </div>
                <div
                    class="glass-card rounded-xl overflow-hidden relative group border-white/20"
                >
                    <div
                        class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent"
                    ></div>
                    <div class="p-md relative">
                        <div class="flex gap-xs mb-xs">
                            <span
                                class="bg-white/10 text-white text-[10px] font-label-caps px-2 py-0.5 rounded-sm border border-white/30"
                                >STRENGTH</span
                            >
                            <span
                                class="bg-transparent text-on-surface-variant text-[10px] font-label-caps px-2 py-0.5 rounded-sm border border-white/10"
                                >HYPERTROPHY</span
                            >
                        </div>
                        <h4
                            class="font-headline-md text-headline-md text-white mb-base uppercase italic"
                        >
                            Back &amp; Shoulders: Power V
                        </h4>
                        <p
                            class="text-on-surface-variant text-sm mb-md leading-relaxed"
                        >
                            Advanced volume training focusing on structural
                            aesthetics and functional torque.
                        </p>
                        <button
                            class="w-full bg-white text-black font-label-caps py-sm rounded-sm active:scale-[0.98] transition-transform font-bold tracking-widest"
                        >
                            START SESSION
                        </button>
                    </div>
                </div>
            </section>
            <div class="grid grid-cols-2 gap-gutter mb-lg">
                <div class="glass-card rounded-xl p-md border-white/10">
                    <p
                        class="font-label-caps text-label-caps text-on-surface-variant mb-xs uppercase"
                    >
                        Total Steps
                    </p>
                    <div class="flex items-baseline gap-xs">
                        <span
                            class="font-stat-value text-stat-value italic text-white"
                            >8,432</span
                        >
                        <span
                            class="font-label-caps text-on-surface-variant text-[10px]"
                            >STEPS</span
                        >
                    </div>
                </div>
                <div class="glass-card rounded-xl p-md border-white/10">
                    <p
                        class="font-label-caps text-label-caps text-on-surface-variant mb-xs uppercase"
                    >
                        Protein Rem.
                    </p>
                    <div class="flex items-baseline gap-xs">
                        <span
                            class="font-stat-value text-stat-value italic text-white"
                            >42</span
                        >
                        <span
                            class="font-label-caps text-on-surface-variant text-[10px]"
                            >G</span
                        >
                    </div>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-gutter mb-lg">
                <!-- Large Stat -->
                <div
                    class="col-span-2 glass-card rounded-xl p-md flex flex-col justify-between h-48 overflow-hidden relative border-white/20"
                >
                    <div class="relative z-10">
                        <p
                            class="font-label-caps text-label-caps text-on-surface-variant mb-xs"
                        >
                            DAILY CALORIES
                        </p>
                        <div class="flex items-baseline gap-xs">
                            <span
                                class="font-stat-value text-display-lg-mobile text-primary italic"
                                >2,482</span
                            >
                            <span
                                class="font-label-caps text-on-surface-variant"
                                >KCAL</span
                            >
                        </div>
                    </div>
                    <div class="relative z-10 h-12 flex items-end gap-1">
                        <!-- Mini Graph bars -->
                        <div class="w-full h-6 bg-white/10 rounded-t-sm"></div>
                        <div class="w-full h-8 bg-white/20 rounded-t-sm"></div>
                        <div class="w-full h-10 bg-white/30 rounded-t-sm"></div>
                        <div class="w-full h-12 bg-white rounded-t-sm"></div>
                        <div class="w-full h-9 bg-white/60 rounded-t-sm"></div>
                        <div class="w-full h-7 bg-white/40 rounded-t-sm"></div>
                        <div class="w-full h-11 bg-white/80 rounded-t-sm"></div>
                    </div>
                    <!-- Background decoration -->
                </div>

                <!-- Small Metric Tiles -->
                <div class="glass-card rounded-xl p-md border-white/10">
                    <p
                        class="font-label-caps text-label-caps text-on-surface-variant mb-xs uppercase"
                    >
                        Avg Heart Rate
                    </p>
                    <div class="flex items-baseline gap-xs">
                        <span
                            class="font-stat-value text-stat-value italic text-white"
                            >142</span
                        >
                        <span
                            class="font-label-caps text-on-surface-variant text-[10px]"
                            >BPM</span
                        >
                    </div>
                </div>
                <div class="glass-card rounded-xl p-md border-white/10">
                    <p
                        class="font-label-caps text-label-caps text-on-surface-variant mb-xs uppercase"
                    >
                        Active Time
                    </p>
                    <div class="flex items-baseline gap-xs">
                        <span
                            class="font-stat-value text-stat-value italic text-white"
                            >58</span
                        >
                        <span
                            class="font-label-caps text-on-surface-variant text-[10px]"
                            >MIN</span
                        >
                    </div>
                </div>
            </div>

            <!-- Featured Training Section -->

            <!-- Floating FAB -->
            <button
                class="fixed right-6 bottom-32 w-14 h-14 bg-white text-black rounded-full shadow-2xl z-40 flex items-center justify-center active:scale-90 transition-all bw-shadow"
            >
                <span class="material-symbols-outlined text-3xl font-bold"
                    >add</span
                >
            </button>
        </main>

        <!-- Bottom Navigation Shell -->
        <nav
            class="fixed bottom-6 z-50 flex justify-around items-center px-4 py-3 justify-center left-1/2 -translate-x-1/2"
        >
            <div
                class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[calc(100%-48px)] max-w-md rounded-full bg-black/90 backdrop-blur-2xl border border-white/20 shadow-2xl flex justify-around items-center py-2 px-2 h-16"
            >
                <!-- Home (Active) -->
                <button
                    class="flex flex-col items-center justify-center bg-white text-black rounded-full py-2 scale-105 active:scale-90 transition-all duration-200 px-4"
                >
                    <span class="material-symbols-outlined" data-weight="fill"
                        >home</span
                    >
                    <span class="font-label-caps text-[9px] mt-0.5">Home</span>
                </button>
                <!-- Workout -->
                <button
                    class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-2 hover:text-white transition-colors active:scale-90 duration-200"
                >
                    <span class="material-symbols-outlined"
                        >fitness_center</span
                    >
                    <span class="font-label-caps text-[9px] mt-0.5"
                        >Workout</span
                    >
                </button>
                <!-- Activity -->
            </div>
        </nav>
    </body>
</html>
